<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS sea Animations</title>
    <!-- indsæt link her til eksternt stylesheet --> 
     <link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- opbyg HTML struktur her -->
<section class="scene">
  <div class="bg">
      <img src="img/regnbuefisk.gif" alt="regnbue fisk" class="fish1" id="regnbuefisk">
      <img src="img/car.gif" alt="nemo fisk" class="fish2" id="nemofisk">
      <img src="img/light-blue-car.png" alt="blå fisk" class="fish3" id="blåfisk">
      <img src="img/light-blue-car.png" alt="flad fisk" class="fish4" id="fladfisk">
      <img src="img/grøn tang.gif" alt="grøn tang" class="tang1" id="grøndtang">
      <img src="img/lyserød tang.gif" alt="lyserød tang" class="tang2" id="lyserødtang">
  </div>

  <!-- Kisterne lægges her -->
  <img src="img/lukket-kiste.png" alt="lukket kiste" class="kiste1" id="lukketkiste">
  <img src="img/aaben-kiste.png" alt="åben kiste" class="kiste2" id="aabenkiste">

</section>
   <div id="tooltip" class="tooltip"></div>
<!-- indsæt link her til eksternt javascript -->
 <script src="js/animate-fish-in-sea.js"></script>
</body>
</html>
