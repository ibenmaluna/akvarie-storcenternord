<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sea Animations</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- opbyg HTML struktur her -->
    <section class="scene">
      <div class="bg">
        <img
          src="img/regnbuefisk.gif"
          alt="regnbue fisk"
          class="fish1"
          id="regnbuefisk"
        />
        <img
          src="img/nemo-fisk.gif"
          alt="nemo fisk"
          class="fish2"
          id="nemofisk"
        />
        <img
          src="img/blue-fish.gif"
          alt="blå fisk"
          class="fish3"
          id="blåfisk"
        />
        <img src="img/seahorse.gif" alt="søhest" class="fish4" id="søhest" />
        <img
          src="img/green-tang.gif"
          alt="grøn tang"
          class="tang1"
          id="grøntang"
        />
        <img
          src="img/pink-tang.gif"
          alt="lyserød tang"
          class="tang2"
          id="lyserødtang"
        />
        <!-- Kisterne lægges her -->
        <img
          src="img/lukket-kiste.png"
          alt="lukket kiste"
          class="kiste1"
          id="kiste"
        />
      </div>
    </section>
    <div id="tooltip" class="tooltip"></div>
    <!-- indsæt link her til eksternt javascript -->
    <script src="js/animate-fish-in-sea.js"></script>
  </body>
</html>
